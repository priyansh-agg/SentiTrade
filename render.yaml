services:
  - type: web
    name: sentitrade-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ENABLE_LIVE_PRICE_API
        value: "false"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

  - type: web
    name: sentitrade-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
